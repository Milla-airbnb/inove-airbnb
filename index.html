async function sbGet(tabela) {
  const r = await fetch(`${SB_URL}/rest/v1/${tabela}?order=id`, {
    headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }
  });
  return r.ok ? r.json() : [];
}

async function sbUpsert(tabela, dados) {
  await fetch(`${SB_URL}/rest/v1/${tabela}`, {
    method: "POST",
    headers: {
      apikey: SB_KEY,
      Authorization: `Bearer ${SB_KEY}`,
      "Content-Type": "application/json",
      Prefer: "resolution=merge-duplicates"
    },
    body: JSON.stringify(dados)
  });
}

async function sbPatch(tabela, id, dados) {
  await fetch(`${SB_URL}/rest/v1/${tabela}?id=eq.${id}`, {
    method: "PATCH",
    headers: {
      apikey: SB_KEY,
      Authorization: `Bearer ${SB_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(dados)
  });
}

async function sbDelete(tabela, id) {

// CONSTANTES
// ─────────────────────────────────────────────
const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const MESES_ABR = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

const CATEGORIAS = ["Diarista","Manutenção","Material de Limpeza","Outros"];
const COR_PLAT = { Airbnb:"#FF5A5F", Booking:"#003580", Direto:"#10b981", VRBO:"#1a6fdb", Outros:"#8b5cf6" };

const R = n => Number(n||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const pv = v => { const s = String(v||"").replace(/[^0-9,.]/g,"").replace(",","."); const n = parseFloat(s); return isNaN(n)?0:n; };
const mesDeData = s => s ? new Date(s+"T00:00:00").getMonth() : null;
const fmtData = s => s ? new Date(s+"T00:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"}) : "—";
const diffDias = (ci,co) => { if(!ci||!co) return 1; return Math.max(1,Math.round((new Date(co+"T00:00:00")-new Date(ci+"T00:00:00"))/(864e5))); };

function calcOcupacao(reservas, mes, ano) {
  const diasNoMes = new Date(ano, mes+1, 0).getDate();
  const ocupados = new Set();
  reservas.forEach(r => {
    if (!r.checkin || !r.checkout) return;
    let cur = new Date(r.checkin+"T00:00:00");
    const fim = new Date(r.checkout+"T00:00:00");
    while (cur < fim) {
      if (cur.getFullYear()===ano && cur.getMonth()===mes) ocupados.add(cur.getDate());
      cur.setDate(cur.getDate()+1);
    }
  });
  const oc = ocupados.size;
  return { ocupados: oc, vagos: diasNoMes-oc, diasNoMes, taxa: Math.round(oc/diasNoMes*100) };
}

// Comprovantes ficam locais
// Comprime imagem antes de salvar (máx 800px, qualidade 0.6)
async function comprimirImagem(dataUrl, tipo) {
  if (!tipo || !tipo.startsWith("image")) return dataUrl;
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const maxW = 800;
      let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", 0.6));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

      comps.push(`<div style="margin-bottom:12px;background:#f8fafc;padding:10px;border-radius:8px">
        <div style="font-size:11px;font-weight:700;color:#334155;margin-bottom:6px">${d.categoria} — ${d.descricao} (${R(d.valor)}) — ${c.nome||`Comprovante ${i+1}`}</div>
        ${c.tipo?.startsWith("image") ? `<img src="${c.dataUrl}" style="max-width:280px;border-radius:6px;border:1px solid #cbd5e1"/>` : `<div style="font-size:11px;padding:8px;background:#fff;border-radius:4px">📄 ${c.nome}</div>`}

  const camRef = useRef(null);

  const [fProp, setFProp] = useState({id:"",nome:"",email:"",telefone:""});

  // ── CARREGAR DO SUPABASE ──
  const carregar = async () => {
    setLoading(true);
    try {
      const [a,p,r,d] = await Promise.all([sbGet("aptos"),sbGet("proprietarios"),sbGet("reservas"),sbGet("despesas")]);
      setAptos(a||[]);

      setDespesas((d||[]).map(x=>({...x, comprovantes: x.comprovantes||[]})));
    } catch(e) { console.error(e); }
    setLoading(false);
  };

  const nomeProp = id => props.find(p=>p.id==id)?.nome || "—";

  // Mês real de uma reserva = mês do check-in
  const mesReserva = r => r.checkin ? new Date(r.checkin+"T00:00:00").getMonth() : (r.mes||0);

  // ── RESERVAS FILTRADAS E ORDENADAS ──
  const reservasFiltradas = useMemo(()=>{
    let list = reservas;
    if (aptoFiltro!=="todos") list = list.filter(r=>r.apto_id==aptoFiltro);
    if (mesFiltroRes!=="todos") list = list.filter(r=>mesReserva(r)==parseInt(mesFiltroRes));
    return list.sort((a,b)=>{
      const da = a.checkin ? new Date(a.checkin+"T00:00:00").getTime() : 0;
      const db = b.checkin ? new Date(b.checkin+"T00:00:00").getTime() : 0;
      return da-db;
    });
  },[reservas,aptoFiltro,mesFiltroRes]);

  // Agrupadas por mês real
  const reservasPorMes = useMemo(()=>{
    const g={};
    reservasFiltradas.forEach(r=>{ const m=mesReserva(r); if(!g[m]) g[m]=[]; g[m].push(r); });
    return Object.keys(g).map(Number).sort((a,b)=>a-b).map(m=>({mes:m, reservas:g[m]}));
  },[reservasFiltradas]);

  // ── DESPESAS FILTRADAS ──
  const despesasFiltradas = useMemo(()=>{
    let list = despesas;
    if (aptoFiltroDep!=="todos") list = list.filter(d=>d.apto_id==aptoFiltroDep);

  },[despesas,aptoFiltroDep,mesFiltroDep]);

  const dadosDash = useMemo(()=>{
    let list = reservas;
    if (aptoFiltro!=="todos") list = list.filter(r=>r.apto_id==aptoFiltro);
    if (visaoDash==="mensal") list = list.filter(r=>mesReserva(r)==mesDash);
    const bruto = list.reduce((s,r)=>s+Number(r.valor_bruto||0),0);
    const comPlat = list.reduce((s,r)=>s+Number(r.comissao_plat||0),0);
    const comAdm = list.reduce((s,r)=>s+Number(r.comissao_adm||0),0);
    const liquido = bruto-comPlat-comAdm;
    return { total:list.length, diarias:list.reduce((s,r)=>s+Number(r.diarias||0),0), bruto, comPlat, comAdm, liquido, efetivadas:list.filter(r=>r.efetivada).length, pendentes:list.filter(r=>!r.efetivada).length };
  },[reservas,aptoFiltro,visaoDash,mesDash]);

  const porMes = useMemo(()=>{
    let list = reservas;
    if (aptoFiltro!=="todos") list = list.filter(r=>r.apto_id==aptoFiltro);
    return MESES.map((_,i)=>{ const m=list.filter(r=>mesReserva(r)==i); return {mes:MESES_ABR[i], bruto:m.reduce((s,r)=>s+Number(r.valor_bruto||0),0), reservas:m.length}; });
  },[reservas,aptoFiltro]);
  const maxBruto = Math.max(...porMes.map(m=>m.bruto),1);

  const porPlat = useMemo(()=>{
    let list = reservas;
    if (aptoFiltro!=="todos") list = list.filter(r=>r.apto_id==aptoFiltro);
    if (visaoDash==="mensal") list = list.filter(r=>mesReserva(r)==mesDash);
    const g={};
    list.forEach(r=>{ if(!g[r.plataforma]) g[r.plataforma]={bruto:0,qtd:0}; g[r.plataforma].bruto+=Number(r.valor_bruto||0); g[r.plataforma].qtd++; });
    return Object.entries(g).map(([p,v])=>({plat:p,...v})).sort((a,b)=>b.bruto-a.bruto);
  },[reservas,aptoFiltro,visaoDash,mesDash]);

  const ocupDash = useMemo(()=>{
    if (visaoDash!=="mensal") return null;
    const aptosVisiveis = aptoFiltro==="todos" ? aptos : aptos.filter(a=>a.id==aptoFiltro);
    return aptosVisiveis.map(a=>{ const ar=reservas.filter(r=>r.apto_id==a.id); return {...a, ...calcOcupacao(ar,mesDash,2026)}; });
  },[aptos,reservas,aptoFiltro,visaoDash,mesDash]);

  // ── REPASSE ──
  const dadosRepasse = useMemo(()=>{
    return props.map(p=>{
      const aptosP = aptos.filter(a=>a.proprietario==p.id);
      let resP = reservas.filter(r=>aptosP.some(a=>a.id==r.apto_id));
      let depP = despesas.filter(d=>aptosP.some(a=>a.id==d.apto_id));
      if (mesRepasse!=="todos") {
        const m = parseInt(mesRepasse);
        resP = resP.filter(r=>mesReserva(r)==m);
        depP = depP.filter(d=>d.mes==m);
      }
      const bruto = resP.reduce((s,r)=>s+Number(r.valor_bruto||0),0);
      const comPlat = resP.reduce((s,r)=>s+Number(r.comissao_plat||0),0);
      const comAdm = resP.reduce((s,r)=>s+Number(r.comissao_adm||0),0);
      const totalDesp = depP.reduce((s,d)=>s+Number(d.valor||0),0);
      const repasse = bruto-comPlat-comAdm-totalDesp;
      const aptosDetalhe = aptosP.map(a=>{
        let arA = reservas.filter(r=>r.apto_id==a.id);
        let depA = despesas.filter(d=>d.apto_id==a.id);
        if (mesRepasse!=="todos") { const m=parseInt(mesRepasse); arA=arA.filter(r=>mesReserva(r)==m); depA=depA.filter(d=>d.mes==m); }
        const bA=arA.reduce((s,r)=>s+Number(r.valor_bruto||0),0);
        const cpA=arA.reduce((s,r)=>s+Number(r.comissao_plat||0),0);
        const caA=arA.reduce((s,r)=>s+Number(r.comissao_adm||0),0);
        const dA=depA.reduce((s,d)=>s+Number(d.valor||0),0);
        const oc = mesRepasse!=="todos" ? calcOcupacao(arA,parseInt(mesRepasse),2026) : null;
        return {...a, reservas:arA, despesas:depA, bruto:bA, comPlat:cpA, comAdm:caA, totalDesp:dA, repasse:bA-cpA-caA-dA, ocupacao:oc};
      });
      return {...p, reservas:resP.length, bruto, comPlat, comAdm, totalDesp, repasse, aptosDetalhe};
    });
  },[props,aptos,reservas,despesas,mesRepasse]);

  // ── SALVAR RESERVA ──
  const salvarRes = async () => {
    if (!fRes.aptoId||!fRes.hospede) return;
    const diarias = diffDias(fRes.checkin,fRes.checkout);
    const mes = fRes.checkin ? new Date(fRes.checkin+"T00:00:00").getMonth() : new Date().getMonth();
    const id = editId || Date.now();
    const reg = { id, apto_id:fRes.aptoId, hospede:fRes.hospede, plataforma:fRes.plataforma, checkin:fRes.checkin||null, checkout:fRes.checkout||null, mes, diarias, valor_bruto:parseFloat(pv(fRes.valorBruto).toFixed(2)), comissao_plat:parseFloat(pv(fRes.comissaoPlat).toFixed(2)), comissao_adm:parseFloat(pv(fRes.comissaoAdm).toFixed(2)), efetivada:fRes.efetivada };
    setSalvando(true);
    await sbUpsert("reservas", reg);
    setSalvando(false);
    setReservas(prev => {
      const sem = prev.filter(r=>r.id!=id);
      const compAntigos = prev.find(r=>r.id==id)?.comprovantes||[]; return [...sem, {...reg, comprovantes: compAntigos}];
    });
    setModalRes(false); setEditId(null); setFRes(resVazio);
  };

  // ── SALVAR DESPESA ──
  const salvarDep = async () => {
    if (!fDep.aptoId||!fDep.descricao||!fDep.valor) return;
    const id = editId || Date.now();
    const reg = { id, apto_id:fDep.aptoId, categoria:fDep.categoria, descricao:fDep.descricao, valor:pv(fDep.valor), mes:Number(fDep.mes), data:fDep.data||null };
    setSalvando(true);
    await sbUpsert("despesas", reg);
    setSalvando(false);
    setDespesas(prev => {
      const sem = prev.filter(d=>d.id!=id);
      const compAntigos = prev.find(d=>d.id==id)?.comprovantes||[]; return [...sem, {...reg, comprovantes: compAntigos}];
    });
    setModalDep(false); setEditId(null); setFDep(depVazio);
  };

  // ── SALVAR APTO ──
  const salvarApto = async () => {
    if (!fApto.nome) return;
    const id = fApto.id || "apto"+Date.now();
    const reg = {id, nome:fApto.nome, endereco:fApto.endereco||"", proprietario:fApto.proprietario||"", ativo:fApto.ativo};
    setSalvando(true);
    await sbUpsert("aptos", reg);
    setSalvando(false);
    setAptos(prev=>{ const sem=prev.filter(a=>a.id!=id); return [...sem,reg]; });
    setModalApto(false); setFApto({id:"",nome:"",endereco:"",proprietario:"",ativo:true});
  };

  // ── SALVAR PROP ──
  const salvarProp = async () => {
    if (!fProp.nome) return;
    const id = fProp.id || "prop"+Date.now();
    const reg = {id, nome:fProp.nome, email:fProp.email||"", telefone:fProp.telefone||""};
    setSalvando(true);
    await sbUpsert("proprietarios", reg);
    setSalvando(false);
    setProps(prev=>{ const sem=prev.filter(p=>p.id!=id); return [...sem,reg]; });
    setModalProp(false); setFProp({id:"",nome:"",email:"",telefone:""});
  };

  // ── EXCLUIR ──
  const excluirRes = async id => {
    if (!window.confirm("Excluir esta reserva?")) return;
    await sbDelete("reservas", id);
    setReservas(prev=>prev.filter(r=>r.id!=id));
  };
  const excluirDep = async id => {
    if (!window.confirm("Excluir esta despesa?")) return;
    await sbDelete("despesas", id);
    setDespesas(prev=>prev.filter(d=>d.id!=id));
  };

  // ── TOGGLE EFETIVADA ──
  const toggleEfetivada = async id => {
    const r = reservas.find(x=>x.id==id);
    if (!r) return;
    const nova = {...r, efetivada:!r.efetivada};
    await sbUpsert("reservas", {id:r.id, apto_id:r.apto_id, hospede:r.hospede, plataforma:r.plataforma, checkin:r.checkin, checkout:r.checkout, mes:r.mes, diarias:r.diarias, valor_bruto:r.valor_bruto, comissao_plat:r.comissao_plat, comissao_adm:r.comissao_adm, efetivada:nova.efetivada});
    setReservas(prev=>prev.map(x=>x.id==id ? nova : x));
  };

  // ── COMPROVANTES ──
  // Salva comprovante no Supabase (comprimido)
  const uploadComp = (e) => {
    if (!modalComp) return;
    const {tipo, id} = modalComp;
    const tabela = tipo==="reserva" ? "reservas" : "despesas";
    const files = Array.from(e.target.files||[]);

    const processarProximo = async (idx, compsAtuais) => {
      if (idx >= files.length) {
        // Salva tudo no Supabase
        setSalvando(true);
        await sbPatch(tabela, id, {comprovantes: compsAtuais});
        setSalvando(false);
        // Atualiza estado local
        if (tipo==="reserva") setReservas(prev=>prev.map(r=>r.id==id ? {...r,comprovantes:compsAtuais} : r));
        else setDespesas(prev=>prev.map(d=>d.id==id ? {...d,comprovantes:compsAtuais} : d));
        setModalComp(prev=>prev ? {...prev, _t:Date.now()} : null);
        return;
      }
      const f = files[idx];
      const rd = new FileReader();
      rd.onload = async ev => {
        const dataUrl = await comprimirImagem(ev.target.result, f.type);
        const novo = {nome:f.name, tipo:f.type, dataUrl, data:new Date().toISOString()};
        processarProximo(idx + 1, [...compsAtuais, novo]);
      };
      rd.readAsDataURL(f);
    };

    // Pega comprovantes atuais do estado
    const atuais = tipo==="reserva"
      ? (reservas.find(r=>r.id==id)?.comprovantes||[])
      : (despesas.find(d=>d.id==id)?.comprovantes||[]);
    processarProximo(0, atuais);
    e.target.value="";
  };

  const removerComp = async (idx) => {
    if (!modalComp) return;
    const {tipo, id} = modalComp;
    const tabela = tipo==="reserva" ? "reservas" : "despesas";
    const atuais = tipo==="reserva"
      ? (reservas.find(r=>r.id==id)?.comprovantes||[])
      : (despesas.find(d=>d.id==id)?.comprovantes||[]);
    const novos = atuais.filter((_,i)=>i!==idx);
    setSalvando(true);
    await sbPatch(tabela, id, {comprovantes: novos});
    setSalvando(false);
    if (tipo==="reserva") setReservas(prev=>prev.map(r=>r.id==id ? {...r,comprovantes:novos} : r));
    else setDespesas(prev=>prev.map(d=>d.id==id ? {...d,comprovantes:novos} : d));
    setModalComp(prev=>prev ? {...prev, _t:Date.now()} : null);
  };

  const itemComp = modalComp ? (modalComp.tipo==="reserva" ? reservas.find(r=>r.id==modalComp.id) : despesas.find(d=>d.id==modalComp.id)) : null;
  const compsAtivos = itemComp?.comprovantes || [];

  // ─── ESTILOS ───
  const c = {
    app:{minHeight:"100vh",background:"#0f172a",color:"#e2e8f0",fontFamily:"system-ui,sans-serif",fontSize:14,paddingBottom:70},
    top:{background:"#1e293b",borderBottom:"1px solid #334155",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50},
    topTitle:{fontSize:15,fontWeight:800,color:"#f1f5f9"},
    topSub:{fontSize:11,color:salvando?"#f59e0b":"#64748b"},
    main:{padding:"14px"},
    nav:{position:"fixed",bottom:0,left:0,right:0,background:"#1e293b",borderTop:"1px solid #334155",display:"flex",zIndex:50},
    navBtn:a=>({flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"8px 0",cursor:"pointer",color:a?"#38bdf8":"#64748b",background:"transparent",border:"none",fontSize:10,fontWeight:a?700:400,gap:2}),
    card:{background:"#1e293b",borderRadius:12,padding:"14px",border:"1px solid #334155",marginBottom:10},
    kgrid:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10},
    kpi:(cor)=>({background:"#1e293b",borderRadius:10,padding:"12px",border:"1px solid #334155"}),
    kpiL:cor=>({fontSize:10,color:cor,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6}),
    kpiV:cor=>({fontSize:20,fontWeight:800,color:cor,marginTop:3}),
    kpiS:{fontSize:11,color:"#64748b",marginTop:2},
    title:{fontSize:17,fontWeight:800,color:"#f1f5f9",marginBottom:3},
    sub:{fontSize:12,color:"#64748b",marginBottom:12},
    btn:cor=>({background:cor||"#38bdf8",color:cor?"#fff":"#0f172a",border:"none",borderRadius:8,padding:"9px 14px",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:5}),
    btnSm:cor=>({background:cor||"#334155",color:"#e2e8f0",border:"none",borderRadius:6,padding:"5px 10px",fontSize:12,fontWeight:600,cursor:"pointer"}),
    row:{display:"flex",justifyContent:"space-between",alignItems:"center"},
    tag:cor=>({background:cor+"22",color:cor,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700}),
    sel:{background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"8px 10px",color:"#e2e8f0",fontSize:12,flex:1},
    filtrow:{display:"flex",gap:8,marginBottom:10},
    toggle:{display:"flex",background:"#0f172a",borderRadius:8,padding:3,marginBottom:12},
    tBtn:a=>({flex:1,padding:"8px 0",textAlign:"center",borderRadius:6,fontSize:12,fontWeight:700,cursor:"pointer",background:a?"#38bdf8":"transparent",color:a?"#0f172a":"#94a3b8"}),
    overlay:{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:200,display:"flex",alignItems:"flex-end"},
    modal:{background:"#1e293b",borderRadius:"16px 16px 0 0",padding:"18px 14px",width:"100%",maxHeight:"92vh",overflowY:"auto",border:"1px solid #334155"},
    mhandle:{width:40,height:4,background:"#334155",borderRadius:4,margin:"0 auto 14px"},
    mtitle:{fontSize:15,fontWeight:800,color:"#f1f5f9",marginBottom:14},
    lbl:{fontSize:12,color:"#94a3b8",fontWeight:600,marginBottom:4,display:"block"},
    inp:{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:8,padding:"10px 12px",color:"#e2e8f0",fontSize:14,outline:"none"},
    frow:{marginBottom:12},
    fg2:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10},
    mesHdr:{fontSize:13,fontWeight:800,color:"#38bdf8",margin:"14px 0 8px",textTransform:"uppercase",letterSpacing:0.5},
    rcard:{background:"#1e293b",borderRadius:10,padding:"11px",border:"1px solid #334155",marginBottom:8},
  };

  const NAVS = [{id:"dashboard",icon:"📊",label:"Dashboard"},{id:"reservas",icon:"📅",label:"Reservas"},{id:"despesas",icon:"🧾",label:"Despesas"},{id:"aptos",icon:"🏠",label:"Aptos"},{id:"proprietarios",icon:"👤",label:"Proprietários"},{id:"repasse",icon:"💰",label:"Repasse"}];

  if (loading) return (
    <div style={{minHeight:"100vh",background:"#0f172a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14}}>
      <div style={{fontSize:36}}>🏠</div>
      <div style={{fontSize:16,fontWeight:800,color:"#f1f5f9"}}>Casa by Milla</div>
      <div style={{fontSize:12,color:"#64748b"}}>Carregando dados da nuvem...</div>
      <div style={{width:36,height:36,border:"3px solid #334155",borderTop:"3px solid #38bdf8",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  return (
    <div style={c.app}>
      {/* TOPBAR */}
      <div style={c.top}>
        <div>
          <div style={c.topTitle}>🏠 Casa by Milla</div>
          <div style={c.topSub}>{salvando ? "🔄 Salvando..." : "☁️ Sincronizado"}</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={carregar} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:16}} title="Atualizar">🔃</button>
          <select style={{...c.sel,width:"auto",fontSize:11}} value={aptoFiltro} onChange={e=>setAptoFiltro(e.target.value)}>
            <option value="todos">Todos os aptos</option>
            {aptos.map(a=><option key={a.id} value={a.id}>{a.nome}</option>)}
          </select>
        </div>
      </div>

      <div style={c.main}>

        {/* ══ DASHBOARD ══ */}
        {tela==="dashboard" && <>
          <div style={c.title}>Dashboard</div>
          <div style={c.sub}>{visaoDash==="anual"?"Consolidado 2026":MESES[mesDash]+" 2026"}</div>
          <div style={c.toggle}>
            <div style={c.tBtn(visaoDash==="anual")} onClick={()=>setVisaoDash("anual")}>📅 Anual</div>
            <div style={c.tBtn(visaoDash==="mensal")} onClick={()=>setVisaoDash("mensal")}>🗓️ Mensal</div>
          </div>
          {visaoDash==="mensal" && <select style={{...c.sel,width:"100%",marginBottom:12}} value={mesDash} onChange={e=>setMesDash(parseInt(e.target.value))}>{MESES.map((m,i)=><option key={i} value={i}>{m}</option>)}</select>}
          <div style={c.kgrid}>
            <div style={c.kpi()}><div style={c.kpiL("#38bdf8")}>Reservas</div><div style={c.kpiV("#38bdf8")}>{dadosDash.total}</div><div style={c.kpiS}>{dadosDash.diarias} diárias</div></div>
            <div style={c.kpi()}><div style={c.kpiL("#a78bfa")}>Receita Bruta</div><div style={{...c.kpiV("#a78bfa"),fontSize:16}}>{R(dadosDash.bruto)}</div></div>
            <div style={c.kpi()}><div style={c.kpiL("#f87171")}>Comissões</div><div style={{...c.kpiV("#f87171"),fontSize:16}}>{R(dadosDash.comPlat+dadosDash.comAdm)}</div></div>
            <div style={c.kpi()}><div style={c.kpiL("#34d399")}>Líquido</div><div style={{...c.kpiV("#34d399"),fontSize:16}}>{R(dadosDash.liquido)}</div><div style={c.kpiS}>{dadosDash.bruto>0?(dadosDash.liquido/dadosDash.bruto*100).toFixed(1)+"%":"—"}</div></div>
          </div>
          <div style={{...c.card,display:"flex",gap:16,marginBottom:10}}>
            <div style={{flex:1}}><div style={{fontSize:10,color:"#64748b"}}>✓ Efetivadas</div><div style={{fontSize:18,fontWeight:800,color:"#34d399"}}>{dadosDash.efetivadas}</div></div>
            <div style={{flex:1}}><div style={{fontSize:10,color:"#64748b"}}>⏳ Pendentes</div><div style={{fontSize:18,fontWeight:800,color:"#fb923c"}}>{dadosDash.pendentes}</div></div>
          </div>
          {/* Ocupação mensal */}
          {visaoDash==="mensal" && ocupDash && <div style={c.card}>
            <div style={{fontSize:12,fontWeight:700,color:"#94a3b8",marginBottom:12}}>📆 Ocupação — {MESES[mesDash]}</div>
            {ocupDash.map((a,i)=><div key={i} style={{marginBottom:i<ocupDash.length-1?12:0}}>
              <div style={{...c.row,marginBottom:5}}><span style={{fontSize:13,fontWeight:700,color:"#f1f5f9"}}>{a.nome}</span><span style={{fontSize:13,fontWeight:800,color:"#38bdf8"}}>{a.taxa}%</span></div>
              <div style={{background:"#0f172a",borderRadius:6,height:10,overflow:"hidden",marginBottom:5}}><div style={{width:`${a.taxa}%`,background:"linear-gradient(90deg,#10b981,#38bdf8)",height:"100%",borderRadius:6}}/></div>
              <div style={{display:"flex",gap:14}}><span style={{fontSize:10,color:"#34d399"}}>🟢 {a.ocupados} ocupados</span><span style={{fontSize:10,color:"#94a3b8"}}>⬜ {a.vagos} vagos</span></div>
            </div>)}
          </div>}
          {/* Gráfico mensal */}
          {visaoDash==="anual" && <div style={c.card}>
            <div style={{fontSize:12,fontWeight:700,color:"#94a3b8",marginBottom:12}}>📈 Receita por Mês</div>
            {porMes.filter(m=>m.bruto>0).length===0 && <div style={{color:"#475569",fontSize:12}}>Sem dados.</div>}
            {porMes.filter(m=>m.bruto>0).map((m,i)=><div key={i} style={{marginBottom:10}}>
              <div style={{...c.row,marginBottom:4}}><span style={{fontSize:12,color:"#94a3b8"}}>{m.mes} ({m.reservas})</span><span style={{fontSize:12,color:"#34d399",fontWeight:700}}>{R(m.bruto)}</span></div>
              <div style={{background:"#0f172a",borderRadius:4,height:8,overflow:"hidden"}}><div style={{width:`${m.bruto/maxBruto*100}%`,background:"#38bdf8",height:"100%",borderRadius:4}}/></div>
            </div>)}
          </div>}
          {/* Por plataforma */}
          <div style={c.card}>
            <div style={{fontSize:12,fontWeight:700,color:"#94a3b8",marginBottom:12}}>🏷️ Por Plataforma</div>
            {porPlat.length===0 && <div style={{color:"#475569",fontSize:12}}>Sem dados.</div>}
            {porPlat.map((p,i)=><div key={i} style={{marginBottom:12}}>
              <div style={{...c.row,marginBottom:5}}>
                <span style={{background:COR_PLAT[p.plat]||"#64748b",color:"#fff",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700}}>{p.plat}</span>
                <div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:700,color:"#f1f5f9"}}>{R(p.bruto)}</div><div style={{fontSize:10,color:"#64748b"}}>{p.qtd} reservas</div></div>
              </div>

            <div style={c.mesHdr}>📆 {MESES[g.mes]} <span style={{color:"#475569",fontWeight:400,fontSize:11}}>({g.reservas.length})</span></div>

              <div style={{...c.row,marginBottom:7}}>
                <div>

                  <div style={{fontSize:11,color:"#64748b"}}>{nomeApto(r.apto_id)} · {fmtData(r.checkin)} a {fmtData(r.checkout)} · {r.diarias} diária(s)</div>

                <span style={{background:COR_PLAT[r.plataforma]||"#64748b",color:"#fff",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700}}>{r.plataforma}</span>

              <div style={{display:"flex",gap:12,marginBottom:8}}>
                <div><div style={{fontSize:10,color:"#64748b"}}>Bruto</div><div style={{fontSize:13,fontWeight:700,color:"#a78bfa"}}>{R(r.valor_bruto)}</div></div>
                <div><div style={{fontSize:10,color:"#64748b"}}>Comissões</div><div style={{fontSize:13,fontWeight:700,color:"#f87171"}}>{R(Number(r.comissao_plat||0)+Number(r.comissao_adm||0))}</div></div>
                <div><div style={{fontSize:10,color:"#64748b"}}>Líquido</div><div style={{fontSize:13,fontWeight:700,color:"#34d399"}}>{R(Number(r.valor_bruto||0)-Number(r.comissao_plat||0)-Number(r.comissao_adm||0))}</div></div>

                  <button style={c.btnSm("#7f1d1d")} onClick={()=>excluirRes(r.id)}>🗑</button>

            <div><span style={{fontSize:11,color:"#64748b"}}>Bruto: </span><span style={{fontWeight:800,color:"#a78bfa"}}>{R(reservasFiltradas.reduce((s,r)=>s+Number(r.valor_bruto||0),0))}</span></div>
            <div><span style={{fontSize:11,color:"#64748b"}}>Líquido: </span><span style={{fontWeight:800,color:"#34d399"}}>{R(reservasFiltradas.reduce((s,r)=>s+Number(r.valor_bruto||0)-Number(r.comissao_plat||0)-Number(r.comissao_adm||0),0))}</span></div>

            <select style={c.sel} value={aptoFiltroDep} onChange={e=>setAptoFiltroDep(e.target.value)}>

          {despesasFiltradas.length===0 && <div style={{...c.card,color:"#475569",textAlign:"center",padding:28}}>Nenhuma despesa em {MESES[mesFiltroDep]}.</div>}

              <div>
                <div style={{fontSize:14,fontWeight:800,color:"#f1f5f9"}}>{d.descricao}</div>

                const todasDespMes = despesas.filter(d => d.mes==mesN && d.apto_id==a.id);

            </div>)}
          </div>)}
          {dadosRepasse.length===0 && <div style={{...c.card,color:"#475569",textAlign:"center",padding:24}}>Cadastre proprietários para ver o relatório.</div>}
        </>}

      <div style={c.nav}>
        {NAVS.map(n=><button key={n.id} style={c.navBtn(tela===n.id)} onClick={()=>setTela(n.id)}>

          <div style={c.frow}><label style={c.lbl}>Apartamento *</label><select style={c.inp} value={fRes.aptoId} onChange={e=>setFRes({...fRes,aptoId:e.target.value})}><option value="">Selecione...</option>{aptos.map(a=><option key={a.id} value={a.id}>{a.nome}</option>)}</select></div>
          <div style={c.frow}><label style={c.lbl}>Plataforma</label><select style={c.inp} value={fRes.plataforma} onChange={e=>setFRes({...fRes,plataforma:e.target.value})}>{PLATAFORMAS.map(p=><option key={p}>{p}</option>)}</select></div>
          <div style={c.frow}><label style={c.lbl}>Nome do Hóspede *</label><input style={c.inp} value={fRes.hospede} onChange={e=>setFRes({...fRes,hospede:e.target.value})} placeholder="Ex: João Silva"/></div>

          {fRes.checkin&&fRes.checkout&&<div style={{fontSize:11,color:"#38bdf8",marginBottom:10}}>📅 {fRes.diarias} diária(s) — {fRes.checkin?MESES[new Date(fRes.checkin+"T00:00:00").getMonth()]:""}</div>}

            <div style={c.frow}><label style={c.lbl}>Comissão Plataforma</label><input style={c.inp} type="text" inputMode="decimal" placeholder="0,00" value={fRes.comissaoPlat} onChange={e=>setFRes({...fRes,comissaoPlat:e.target.value.replace(/[^0-9,.]/g,"")})}/></div>
            <div style={c.frow}><label style={c.lbl}>Comissão ADM</label><input style={c.inp} type="text" inputMode="decimal" placeholder="0,00" value={fRes.comissaoAdm} onChange={e=>setFRes({...fRes,comissaoAdm:e.target.value.replace(/[^0-9,.]/g,"")})}/></div>
          </div>
          <div style={c.frow}>
            <label style={c.lbl}>Status</label>
            <div style={{display:"flex",gap:8}}>

            </div>

          {pv(fRes.valorBruto)>0 && <div style={{background:"#0f172a",borderRadius:8,padding:"9px 12px",marginBottom:12,display:"flex",gap:14}}>
            <div><span style={{fontSize:11,color:"#64748b"}}>Comissões: </span><span style={{fontWeight:700,color:"#f87171"}}>{R(pv(fRes.comissaoPlat)+pv(fRes.comissaoAdm))}</span></div>
            <div><span style={{fontSize:11,color:"#64748b"}}>Líquido: </span><span style={{fontWeight:700,color:"#34d399"}}>{R(pv(fRes.valorBruto)-pv(fRes.comissaoPlat)-pv(fRes.comissaoAdm))}</span></div>
          </div>}
          <div style={{display:"flex",gap:10}}>
            <button style={{...c.btn("#334155"),flex:1,justifyContent:"center"}} onClick={()=>setModalRes(false)}>Cancelar</button>
            <button style={{...c.btn(),flex:1,justifyContent:"center"}} onClick={salvarRes}>{salvando?"Salvando...":"Salvar"}</button>
          </div>
        </div>
      </div>}

      {modalDep && <div style={c.overlay} onClick={e=>e.target===e.currentTarget&&setModalDep(false)}>

          <div style={c.mhandle}/>
          <div style={c.mtitle}>{editId?"✏️ Editar Despesa":"🧾 Nova Despesa do Mês"}</div>
          <div style={c.frow}><label style={c.lbl}>Apartamento *</label><select style={c.inp} value={fDep.aptoId} onChange={e=>setFDep({...fDep,aptoId:e.target.value})}><option value="">Selecione...</option>{aptos.map(a=><option key={a.id} value={a.id}>{a.nome}</option>)}</select></div>
          <div style={c.frow}><label style={c.lbl}>Categoria</label><select style={c.inp} value={fDep.categoria} onChange={e=>setFDep({...fDep,categoria:e.target.value})}>{CATEGORIAS.map(c=><option key={c}>{c}</option>)}</select></div>
          <div style={c.frow}><label style={c.lbl}>Descrição *</label><input style={c.inp} value={fDep.descricao} onChange={e=>setFDep({...fDep,descricao:e.target.value})} placeholder="Ex: Diarista — Lorena"/></div>
          <div style={c.fg2}>
            <div style={c.frow}><label style={c.lbl}>Valor (R$) *</label><input style={c.inp} type="text" inputMode="decimal" placeholder="0,00" value={fDep.valor} onChange={e=>setFDep({...fDep,valor:e.target.value.replace(/[^0-9,.]/g,"")})}/></div>

            <button style={{...c.btn("#334155"),flex:1,justifyContent:"center"}} onClick={()=>setModalDep(false)}>Cancelar</button>
            <button style={{...c.btn(),flex:1,justifyContent:"center"}} onClick={salvarDep}>{salvando?"Salvando...":"Salvar"}</button>
          </div>
        </div>
      </div>}

      {/* ══ MODAL COMPROVANTES ══ */}
      {modalComp && <div style={c.overlay} onClick={e=>e.target===e.currentTarget&&setModalComp(null)}>
        <div style={c.modal}>
          <div style={c.mhandle}/>
          <div style={c.mtitle}>📎 Comprovantes — {modalComp.nome}</div>
          <div style={{display:"flex",gap:10,marginBottom:14}}>
            <button style={{...c.btn(),flex:1,justifyContent:"center"}} onClick={()=>camRef.current?.click()}>📷 Tirar Foto</button>
            <button style={{...c.btn("#334155"),flex:1,justifyContent:"center"}} onClick={()=>fileRef.current?.click()}>📁 Anexar Arquivo</button>
          </div>
          <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={uploadComp}/>
          <input ref={fileRef} type="file" accept="image/*,application/pdf" multiple style={{display:"none"}} onChange={uploadComp}/>
          {compsAtivos.length===0 && <div style={{color:"#475569",textAlign:"center",padding:20,fontSize:13}}>Nenhum comprovante ainda.</div>}
          {compsAtivos.map((comp,idx)=><div key={idx} style={{background:"#0f172a",borderRadius:8,padding:10,display:"flex",gap:10,alignItems:"center",marginBottom:8}}>
            {comp.tipo?.startsWith("image") ? <img src={comp.dataUrl} alt={comp.nome} style={{width:48,height:48,borderRadius:6,objectFit:"cover"}}/> : <div style={{width:48,height:48,borderRadius:6,background:"#1e293b",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>📄</div>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:700,color:"#f1f5f9",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{comp.nome}</div>
              <div style={{fontSize:10,color:"#64748b"}}>{new Date(comp.data).toLocaleDateString("pt-BR")}</div>
            </div>
            <button style={c.btnSm("#7f1d1d")} onClick={()=>removerComp(idx)}>🗑</button>
          </div>)}
          <button style={{...c.btn("#334155"),width:"100%",justifyContent:"center",marginTop:8}} onClick={()=>setModalComp(null)}>Fechar</button>
        </div>
      </div>}

      {/* ══ MODAL APTO ══ */}
      {modalApto && <div style={c.overlay} onClick={e=>e.target===e.currentTarget&&setModalApto(false)}>
        <div style={c.modal}>
          <div style={c.mhandle}/>
          <div style={c.mtitle}>{fApto.id?"✏️ Editar Apto":"🏠 Novo Apartamento"}</div>
          <div style={c.frow}><label style={c.lbl}>Nome *</label><input style={c.inp} value={fApto.nome} onChange={e=>setFApto({...fApto,nome:e.target.value})} placeholder="Ex: Apto 2902"/></div>
          <div style={c.frow}><label style={c.lbl}>Endereço</label><input style={c.inp} value={fApto.endereco} onChange={e=>setFApto({...fApto,endereco:e.target.value})} placeholder="Rua, número, bairro..."/></div>
          <div style={c.frow}><label style={c.lbl}>Proprietário</label><select style={c.inp} value={fApto.proprietario} onChange={e=>setFApto({...fApto,proprietario:e.target.value})}><option value="">Selecione...</option>{props.map(p=><option key={p.id} value={p.id}>{p.nome}</option>)}</select></div>
          <div style={c.frow}><label style={c.lbl}>Status</label><select style={c.inp} value={fApto.ativo?"ativo":"inativo"} onChange={e=>setFApto({...fApto,ativo:e.target.value==="ativo"})}><option value="ativo">Ativo</option><option value="inativo">Inativo</option></select></div>
          <div style={{display:"flex",gap:10}}>
            <button style={{...c.btn("#334155"),flex:1,justifyContent:"center"}} onClick={()=>setModalApto(false)}>Cancelar</button>
            <button style={{...c.btn(),flex:1,justifyContent:"center"}} onClick={salvarApto}>{salvando?"Salvando...":"Salvar"}</button>
          </div>
        </div>
      </div>}

      {/* ══ MODAL PROP ══ */}
      {modalProp && <div style={c.overlay} onClick={e=>e.target===e.currentTarget&&setModalProp(false)}>
        <div style={c.modal}>
          <div style={c.mhandle}/>
          <div style={c.mtitle}>{fProp.id?"✏️ Editar Proprietário":"👤 Novo Proprietário"}</div>
          <div style={c.frow}><label style={c.lbl}>Nome *</label><input style={c.inp} value={fProp.nome} onChange={e=>setFProp({...fProp,nome:e.target.value})} placeholder="Nome completo"/></div>
          <div style={c.frow}><label style={c.lbl}>E-mail</label><input style={c.inp} type="email" value={fProp.email} onChange={e=>setFProp({...fProp,email:e.target.value})} placeholder="email@exemplo.com"/></div>
          <div style={c.frow}><label style={c.lbl}>Telefone</label><input style={c.inp} value={fProp.telefone} onChange={e=>setFProp({...fProp,telefone:e.target.value})} placeholder="(00) 00000-0000"/></div>
          <div style={{display:"flex",gap:10}}>
            <button style={{...c.btn("#334155"),flex:1,justifyContent:"center"}} onClick={()=>setModalProp(false)}>Cancelar</button>
            <button style={{...c.btn(),flex:1,justifyContent:"center"}} onClick={salvarProp}>{salvando?"Salvando...":"Salvar"}</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
