const sbFetch = async (tabela, metodo = "GET", corpo = null, filtro = "") => {
  const url = `${SUPABASE_URL}/rest/v1/${tabela}${filtro}`;
  const opts = {
    method: metodo,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": metodo === "POST" ? "resolution=merge-duplicates,return=representation" : "return=representation",
    },
  };
  if (corpo) opts.body = JSON.stringify(corpo);
  const res = await fetch(url, opts);
  if (!res.ok) { const err = await res.text(); console.error("Supabase erro:", err); return null; }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
};

// Calcula dias ocupados num mês a partir das reservas (cada diária = 1 dia)
const calcOcupacao = (reservas, mes, ano) => {
  const diasNoMes = new Date(ano, mes + 1, 0).getDate();
  const diasOcupados = new Set();
  reservas.forEach(r => {
    if (!r.checkin || !r.checkout) {
      // fallback: usa diarias e mes
      if (r.mes === mes) for (let d = 1; d <= r.diarias; d++) diasOcupados.add(d);
      return;
    }
    const ci = new Date(r.checkin + "T00:00:00");
    const co = new Date(r.checkout + "T00:00:00");
    let cur = new Date(ci);
    while (cur < co) {
      if (cur.getFullYear() === ano && cur.getMonth() === mes) {
        diasOcupados.add(cur.getDate());
      }
      cur.setDate(cur.getDate() + 1);
    }
  });
  const ocupados = diasOcupados.size;
  const vagos = diasNoMes - ocupados;
  const taxa = diasNoMes > 0 ? Math.round(ocupados / diasNoMes * 100) : 0;
  return { ocupados, vagos, diasNoMes, taxa };
};

  if (r.checkin && r.checkout) {

    const co = new Date(r.checkout + "T00:00:00");
    const fmt = (d) => d.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
    return `${fmt(ci)} a ${fmt(co)}`;
  }
  return r.periodo || "—";
};

function App() {
  const [tela, setTela] = useState("dashboard");
  const [aptos, setAptos] = useState(APTOS_INICIAIS);
  const [proprietarios, setProprietarios] = useState(PROPRIETARIOS_INICIAIS);
  const [reservas, setReservas] = useState(RESERVAS_INICIAIS);
  const [despesas, setDespesas] = useState(DESPESAS_INICIAIS);
  const [carregando, setCarregando] = useState(true);
  const [sincronizando, setSincronizando] = useState(false);

  // Carrega dados do Supabase — função reutilizável
  const carregarDaNuvem = async (mostrarLoading = false) => {
    if (mostrarLoading) setCarregando(true);
    else setSincronizando(true);
    try {
      const [aptosDb, propsDb, reservasDb, despesasDb] = await Promise.all([
        sbFetch("aptos?order=nome"),
        sbFetch("proprietarios?order=nome"),
        sbFetch("reservas?order=id"),
        sbFetch("despesas?order=id"),
      ]);
      if (aptosDb && aptosDb.length > 0) setAptos(aptosDb.map(aptoDoBanco));
      if (propsDb && propsDb.length > 0) setProprietarios(propsDb.map(propDoBanco));
      if (reservasDb && reservasDb.length > 0) setReservas(reservasDb.map(reservaDoBanco));
      else if (reservasDb && reservasDb.length === 0) {
        await Promise.all([
          ...APTOS_INICIAIS.map(a => sbFetch("aptos", "POST", aptoParaBanco(a))),
          ...PROPRIETARIOS_INICIAIS.map(p => sbFetch("proprietarios", "POST", propParaBanco(p))),
          ...RESERVAS_INICIAIS.map(r => sbFetch("reservas", "POST", reservaParaBanco(r))),
        ]);
      }
      if (despesasDb && despesasDb.length > 0) setDespesas(despesasDb.map(despesaDoBanco));
    } catch(e) { console.error("Erro ao carregar:", e); }
    if (mostrarLoading) setCarregando(false);
    else setSincronizando(false);
  };

  // Carrega ao iniciar
  useEffect(() => { carregarDaNuvem(true); }, []);

  // Atualiza automaticamente a cada 60 segundos
  useEffect(() => {
    const intervalo = setInterval(() => carregarDaNuvem(false), 60000);
    return () => clearInterval(intervalo);
  }, []);

  // Migra dados do localStorage (versão antiga) para o Supabase
  const migrarDadosLocais = async () => {
    setSincronizando(true);
    try {
      const aptosLocal = JSON.parse(localStorage.getItem("cbm_aptos") || "[]");
      const propsLocal = JSON.parse(localStorage.getItem("cbm_props") || "[]");
      const reservasLocal = JSON.parse(localStorage.getItem("cbm_reservas") || "[]");
      const despesasLocal = JSON.parse(localStorage.getItem("cbm_despesas") || "[]");

      if (aptosLocal.length > 0) await Promise.all(aptosLocal.map(a => sbFetch("aptos", "POST", aptoParaBanco(a))));
      if (propsLocal.length > 0) await Promise.all(propsLocal.map(p => sbFetch("proprietarios", "POST", propParaBanco(p))));
      if (reservasLocal.length > 0) await Promise.all(reservasLocal.map(r => sbFetch("reservas", "POST", reservaParaBanco(r))));
      if (despesasLocal.length > 0) await Promise.all(despesasLocal.map(d => sbFetch("despesas", "POST", despesaParaBanco(d))));

      // Recarrega tudo do Supabase após migração
      await carregarDaNuvem(false);

      alert(`✅ Migração concluída!\n${reservasLocal.length} reservas, ${aptosLocal.length} aptos, ${despesasLocal.length} despesas enviados para a nuvem.`);
    } catch(e) {
      console.error("Erro na migração:", e);
      alert("❌ Erro na migração. Tente novamente.");
    }
    setSincronizando(false);
  };
  const [aptoFiltro, setAptoFiltro] = useState("todos");
  const [mesFiltro, setMesFiltro] = useState("todos");
  const [visaoDash, setVisaoDash] = useState("anual"); // anual | mensal
  const [mesDash, setMesDash] = useState(new Date().getMonth());
  const [mesRepasse, setMesRepasse] = useState("todos");

  const [modalReserva, setModalReserva] = useState(false);
  const [modalApto, setModalApto] = useState(false);
  const [modalProp, setModalProp] = useState(false);
  const [modalComprovantes, setModalComprovantes] = useState(null); // reserva id
  const [modalDespesa, setModalDespesa] = useState(false);
  const [editDespesa, setEditDespesa] = useState(null);
  const [aptoFiltroDespesa, setAptoFiltroDespesa] = useState("todos");
  const [mesFiltroDespesa, setMesFiltroDespesa] = useState(new Date().getMonth());
  const [editReserva, setEditReserva] = useState(null);
  const fileInputRef = useRef(null);
  const cameraInputRef = useRef(null);

  const formVazio = {aptoId:"",hospede:"",plataforma:"Airbnb",checkin:"",checkout:"",mes:new Date().getMonth(),diarias:1,valorBruto:"",comissaoPlat:"",comissaoAdm:"",limpeza:"160",outrasDespesas:"",efetivada:true,comprovantes:[]};
  const formDespesaVazia = {aptoId:"",categoria:"Diarista",descricao:"",valor:"",mes:new Date().getMonth(),data:"",comprovantes:[]};
  const [formDespesa, setFormDespesa] = useState(formDespesaVazia);
  const [form, setForm] = useState(formVazio);
  const [formApto, setFormApto] = useState({id:"",nome:"",endereco:"",proprietario:"",ativo:true});
  const [formProp, setFormProp] = useState({id:"",nome:"",email:"",telefone:""});

  const saveAptos = async (v) => {
    setAptos(v);
    setSincronizando(true);
    try { await Promise.all(v.map(a => sbFetch("aptos", "POST", aptoParaBanco(a)))); } catch(e){console.error(e);}
    setSincronizando(false);
  };
  const saveProps = async (v) => {
    setProprietarios(v);
    setSincronizando(true);
    try { await Promise.all(v.map(p => sbFetch("proprietarios", "POST", propParaBanco(p)))); } catch(e){console.error(e);}
    setSincronizando(false);
  };
  const saveReservas = async (v) => {
    setReservas(v);
    setSincronizando(true);
    try { await Promise.all(v.map(r => sbFetch("reservas", "POST", reservaParaBanco(r)))); } catch(e){console.error(e);}
    setSincronizando(false);
  };
  const saveDespesas = async (v) => {
    setDespesas(v);
    setSincronizando(true);
    try { await Promise.all(v.map(d => sbFetch("despesas", "POST", despesaParaBanco(d)))); } catch(e){console.error(e);}
    setSincronizando(false);
  };
  const deleteReserva = async (id) => {
    setSincronizando(true);
    try { await sbFetch(`reservas?id=eq.${id}`, "DELETE"); } catch(e){console.error(e);}
    setSincronizando(false);
  };
  const deleteDespesa = async (id) => {
    setSincronizando(true);
    try { await sbFetch(`despesas?id=eq.${id}`, "DELETE"); } catch(e){console.error(e);}
    setSincronizando(false);
  };

  const reservasCalc = useMemo(() => reservas.map(calcReserva), [reservas]);
  const reservasFiltradas = useMemo(() => reservasCalc.filter(r=>(aptoFiltro==="todos"||r.aptoId===aptoFiltro)&&(mesFiltro==="todos"||r.mes===parseInt(mesFiltro))), [reservasCalc,aptoFiltro,mesFiltro]);

  // Totais dashboard - respeita visão anual/mensal
  const totais = useMemo(() => {
    let rf = aptoFiltro==="todos"?reservasCalc:reservasCalc.filter(r=>r.aptoId===aptoFiltro);
    if (visaoDash === "mensal") rf = rf.filter(r => r.mes === mesDash);
    return { reservas:rf.length, diarias:rf.reduce((a,r)=>a+r.diarias,0), bruto:rf.reduce((a,r)=>a+r.valorBruto,0), despesas:rf.reduce((a,r)=>a+r.totalDespesas,0), liquido:rf.reduce((a,r)=>a+r.liquido,0), efetivadas: rf.filter(r=>r.efetivada).length, pendentes: rf.filter(r=>!r.efetivada).length };
  }, [reservasCalc,aptoFiltro,visaoDash,mesDash]);

  const porMes = useMemo(() => MESES.map((m,i)=>{ const rf=aptoFiltro==="todos"?reservasCalc:reservasCalc.filter(r=>r.aptoId===aptoFiltro); const mr=rf.filter(r=>r.mes===i); return {mes:MESES_ABREV[i],bruto:mr.reduce((a,r)=>a+r.valorBruto,0),liquido:mr.reduce((a,r)=>a+r.liquido,0),reservas:mr.length}; }), [reservasCalc,aptoFiltro]);
  const maxBruto = Math.max(...porMes.map(m=>m.bruto),1);

  const porPlat = useMemo(() => {
    let rf = aptoFiltro==="todos"?reservasCalc:reservasCalc.filter(r=>r.aptoId===aptoFiltro);
    if (visaoDash === "mensal") rf = rf.filter(r => r.mes === mesDash);
    return PLATAFORMAS.map(p=>{const pr=rf.filter(r=>r.plataforma===p);return {plat:p,reservas:pr.length,bruto:pr.reduce((a,r)=>a+r.valorBruto,0),liquido:pr.reduce((a,r)=>a+r.liquido,0)};}).filter(p=>p.reservas>0);
  }, [reservasCalc,aptoFiltro,visaoDash,mesDash]);

  const porApto = useMemo(() => {
    return aptos.map(a=>{
      let ar=reservasCalc.filter(r=>r.aptoId===a.id);
      if (visaoDash === "mensal") ar = ar.filter(r => r.mes === mesDash);
      return {...a,reservas:ar.length,bruto:ar.reduce((a,r)=>a+r.valorBruto,0),liquido:ar.reduce((a,r)=>a+r.liquido,0)};
    });
  }, [aptos,reservasCalc,visaoDash,mesDash]);

  // Ocupação: para dashboard mensal ou repasse mensal
  const ocupacaoDash = useMemo(() => {
    if (visaoDash !== "mensal") return null;
    const ano = 2026;
    // Filtra apenas o apto selecionado (se houver) e o mês correto
    const aptosVisiveis = aptoFiltro === "todos" ? aptos : aptos.filter(a => a.id === aptoFiltro);
    return aptosVisiveis.map(a => {
      const ar = reservasCalc.filter(r => r.aptoId === a.id);
      const oc = calcOcupacao(ar, mesDash, ano);
      return { ...a, ...oc };
    });
  }, [aptos, aptoFiltro, reservasCalc, visaoDash, mesDash]);

  const despesasFiltradas = useMemo(() => despesas.filter(d=>(aptoFiltroDespesa==="todos"||d.aptoId===aptoFiltroDespesa)&&d.mes===mesFiltroDespesa), [despesas,aptoFiltroDespesa,mesFiltroDespesa]);

  const repasses = useMemo(() => proprietarios.map(p=>{
    const aptosP = aptos.filter(a=>a.proprietario===p.id);
    let reservasP = reservasCalc.filter(r=>aptosP.some(a=>a.id===r.aptoId));
    let despesasP = despesas.filter(d=>aptosP.some(a=>a.id===d.aptoId));
    if (mesRepasse !== "todos") {
      reservasP = reservasP.filter(r => r.mes === parseInt(mesRepasse));
      despesasP = despesasP.filter(d => d.mes === parseInt(mesRepasse));
    }
    const liquidoReservas = reservasP.reduce((a,r)=>a+r.liquido,0);
    const totalDespesasGerais = despesasP.reduce((a,d)=>a+Number(d.valor||0),0);
    const liquido = liquidoReservas - totalDespesasGerais;
    // Repasse = líquido total (Bruto - Com.Plataforma - Com.Administração - Despesas por reserva - Despesas gerais do mês)
    return {...p,aptosCount:aptosP.length,reservas:reservasP.length,liquido,repasse:liquido,despesasGerais:totalDespesasGerais};
  }), [proprietarios,aptos,reservasCalc,despesas,mesRepasse]);

  // Reservas agrupadas por mês para tela de Reservas
  const reservasPorMes = useMemo(() => {
    const grupos = {};
    reservasFiltradas.forEach(r => {
      if (!grupos[r.mes]) grupos[r.mes] = [];
      grupos[r.mes].push(r);
    });
    return Object.keys(grupos).map(Number).sort((a,b)=>a-b).map(mes => ({
      mes,
      reservas: grupos[mes].sort((a,b) => {
        const da = a.checkin ? new Date(a.checkin+"T00:00:00").getTime() : a.mes*100;
        const db = b.checkin ? new Date(b.checkin+"T00:00:00").getTime() : b.mes*100;
        return da - db;
      })
    }));
  }, [reservasFiltradas]);

  const salvarReserva = () => {
    if (!form.aptoId||!form.hospede) return;
    // Auto-calcular diárias e mês a partir das datas
    let diarias = form.diarias;
    let mes = form.mes;
    if (form.checkin && form.checkout) {
      const ci = new Date(form.checkin + "T00:00:00");
      const co = new Date(form.checkout + "T00:00:00");
      const diff = Math.round((co - ci) / (1000 * 60 * 60 * 24));
      if (diff > 0) diarias = diff;
      mes = ci.getMonth();
    }
    const formParsed = { ...form, diarias, mes, valorBruto:parseValor(form.valorBruto), comissaoPlat:parseValor(form.comissaoPlat), comissaoAdm:parseValor(form.comissaoAdm), limpeza:parseValor(form.limpeza), outrasDespesas:parseValor(form.outrasDespesas) };
    let nova;
    if (editReserva!==null){
      const existente = reservas.find(x=>x.id===editReserva);
      const comprovantesAntigos = existente ? existente.comprovantes : [];
      nova=reservas.map(r=>r.id===editReserva?{...formParsed,id:editReserva,comprovantes:comprovantesAntigos}:r);
    }
    else{ nova=[...reservas,{...formParsed,id:Date.now()}]; }
    saveReservas(nova);
    setModalReserva(false); setEditReserva(null); setForm(formVazio);
  };
  const abrirEditar = (r) => { setForm({aptoId:r.aptoId,hospede:r.hospede,plataforma:r.plataforma,checkin:r.checkin||"",checkout:r.checkout||"",mes:r.mes,diarias:r.diarias,valorBruto:String(r.valorBruto).replace(".",","),comissaoPlat:String(r.comissaoPlat).replace(".",","),comissaoAdm:String(r.comissaoAdm).replace(".",","),limpeza:String(r.limpeza).replace(".",","),outrasDespesas:String(r.outrasDespesas).replace(".",","),efetivada:r.efetivada,comprovantes:r.comprovantes||[]}); setEditReserva(r.id); setModalReserva(true); };
  const excluirReserva = async (id) => { if(window.confirm("Excluir esta reserva?")) { setReservas(prev => prev.filter(r=>r.id!==id)); await deleteReserva(id); } };
  const toggleEfetivada = (id) => { saveReservas(reservas.map(r => r.id===id ? {...r, efetivada: !r.efetivada} : r)); };

  const salvarApto = () => { if(!formApto.nome) return; const id=formApto.id||"apto"+Date.now(); const ex=aptos.find(a=>a.id===formApto.id); saveAptos(ex?aptos.map(a=>a.id===formApto.id?{...formApto}:a):[...aptos,{...formApto,id}]); setModalApto(false); setFormApto({id:"",nome:"",endereco:"",proprietario:"",ativo:true}); };
  const salvarProp = () => { if(!formProp.nome) return; const id=formProp.id||"prop"+Date.now(); const ex=proprietarios.find(p=>p.id===formProp.id); saveProps(ex?proprietarios.map(p=>p.id===formProp.id?{...formProp}:p):[...proprietarios,{...formProp,id}]); setModalProp(false); setFormProp({id:"",nome:"",email:"",telefone:""}); };
  const nomeApto = (id) => aptos.find(a=>a.id===id)?.nome||id;
  const nomeProp = (id) => proprietarios.find(p=>p.id===id)?.nome||"—";

  // CRUD de Despesas Gerais do Mês
  const salvarDespesa = () => {
    if (!formDespesa.aptoId || !formDespesa.descricao || !formDespesa.valor) return;
    const despesaParsed = { ...formDespesa, valor: parseValor(formDespesa.valor) };
    if (editDespesa !== null) {
      const existente = despesas.find(d => d.id === editDespesa);
      const comprovantesAntigos = existente ? existente.comprovantes : [];
      saveDespesas(despesas.map(d => d.id === editDespesa ? {...despesaParsed, id: editDespesa, comprovantes: comprovantesAntigos} : d));
    } else {

              <div style={c.formRow}><label style={c.label}>Mês</label><select style={c.select} value={formDespesa.mes} onChange={e=>setFormDespesa({...formDespesa,mes:parseInt(e.target.value)})}>{MESES.map((m,i)=><option key={i} value={i}>{m}</option>)}</select></div>
            </div>
            <div style={c.formRow}><label style={c.label}>Data (opcional)</label><input style={c.input} type="date" value={formDespesa.data} onChange={e=>setFormDespesa({...formDespesa,data:e.target.value})}/></div>
            <div style={{display:"flex",gap:10}}>
              <button style={{...c.btn("#334155"),flex:1,justifyContent:"center"}} onClick={()=>setModalDespesa(false)}>Cancelar</button>
              <button style={{...c.btn(),flex:1,justifyContent:"center"}} onClick={salvarDespesa}>Salvar</button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL APTO */}
      {modalApto && (
        <div style={c.overlay} onClick={e=>e.target===e.currentTarget&&setModalApto(false)}>
          <div style={c.modal}>
            <div style={c.modalHandle}/>
            <div style={c.modalTitle}>{formApto.id?"✏️ Editar Apto":"🏠 Novo Apartamento"}</div>
            <div style={c.formRow}><label style={c.label}>Nome *</label><input style={c.input} value={formApto.nome} onChange={e=>setFormApto({...formApto,nome:e.target.value})} placeholder="Ex: Apto 2902"/></div>
            <div style={c.formRow}><label style={c.label}>Endereço</label><input style={c.input} value={formApto.endereco} onChange={e=>setFormApto({...formApto,endereco:e.target.value})} placeholder="Rua, número, bairro..."/></div>
            <div style={c.formRow}><label style={c.label}>Proprietário</label><select style={c.select} value={formApto.proprietario} onChange={e=>setFormApto({...formApto,proprietario:e.target.value})}><option value="">Selecione...</option>{proprietarios.map(p=><option key={p.id} value={p.id}>{p.nome}</option>)}</select></div>
            <div style={c.formRow}><label style={c.label}>Status</label><select style={c.select} value={formApto.ativo?"ativo":"inativo"} onChange={e=>setFormApto({...formApto,ativo:e.target.value==="ativo"})}><option value="ativo">Ativo</option><option value="inativo">Inativo</option></select></div>
            <div style={{display:"flex",gap:10}}>
              <button style={{...c.btn("#334155"),flex:1,justifyContent:"center"}} onClick={()=>setModalApto(false)}>Cancelar</button>
              <button style={{...c.btn(),flex:1,justifyContent:"center"}} onClick={salvarApto}>Salvar</button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL PROP */}
      {modalProp && (
        <div style={c.overlay} onClick={e=>e.target===e.currentTarget&&setModalProp(false)}>
          <div style={c.modal}>
            <div style={c.modalHandle}/>
            <div style={c.modalTitle}>{formProp.id?"✏️ Editar Proprietário":"👤 Novo Proprietário"}</div>
            <div style={c.formRow}><label style={c.label}>Nome *</label><input style={c.input} value={formProp.nome} onChange={e=>setFormProp({...formProp,nome:e.target.value})} placeholder="Nome completo"/></div>
            <div style={c.formRow}><label style={c.label}>E-mail</label><input style={c.input} type="email" value={formProp.email} onChange={e=>setFormProp({...formProp,email:e.target.value})} placeholder="email@exemplo.com"/></div>
            <div style={c.formRow}><label style={c.label}>Telefone</label><input style={c.input} value={formProp.telefone} onChange={e=>setFormProp({...formProp,telefone:e.target.value})} placeholder="(00) 00000-0000"/></div>
            <div style={{fontSize:11,color:"#64748b",marginBottom:14,background:"#0f172a",padding:10,borderRadius:8}}>💡 O repasse é calculado automaticamente por reserva: Receita Bruta − Comissão Plataforma − Comissão Administração − Despesas.</div>
            <div style={{display:"flex",gap:10}}>
              <button style={{...c.btn("#334155"),flex:1,justifyContent:"center"}} onClick={()=>setModalProp(false)}>Cancelar</button>
              <button style={{...c.btn(),flex:1,justifyContent:"center"}} onClick={salvarProp}>Salvar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
